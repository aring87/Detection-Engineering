title: Screen Capture Utility Execution
id: SENT-COLL-0003
status: experimental
description: Detects screenshot or screen-capture tooling that may be used to collect user session data.
author: Adam Ring
date: 2026-03-06
modified: 2026-03-06
platform: microsoft_sentinel
query_language: kql
logsource:
  product: windows
  category: process_creation
query: |
  DeviceProcessEvents
  | where FileName in~ ("snippingtool.exe","psr.exe","nircmd.exe")
     or ProcessCommandLine has_any ("screenshot","capturedesktop","screen capture")
  | project Timestamp, DeviceName, AccountName, FileName, ProcessCommandLine
severity: medium
risk_score: 55
tactics:
  - Collection
techniques:
  - T1113
kill_chain_phases:
  - Collection
data_sources:
  - DeviceProcessEvents
falsepositives:
  - Legitimate user screenshots
  - Support or documentation workflows
triage:
  - Validate whether screenshot usage is expected on the device
  - Check if image files were written or staged
  - Look for related exfiltration or credential access behavior
validation:
  - Launch a benign screenshot utility in a lab
lifecycle: experimental
owner: Detection Engineering
tags:
  - attack.collection
  - attack.t1113
  - sentinel
  - collection
