title: Net Group and Domain Trust Discovery
id: SENT-DISC-0001
status: experimental
description: Detects use of built-in tools to enumerate group membership, domain trust, and domain information.
author: Adam Ring
date: 2026-03-06
modified: 2026-03-06
platform: microsoft_sentinel
query_language: kql
logsource:
  product: windows
  category: process_creation
query: |
  DeviceProcessEvents
  | where FileName in~ ("net.exe","nltest.exe","dsquery.exe","whoami.exe")
  | where ProcessCommandLine has_any ("group","localgroup","domain_trusts","/domain","/all_trusts","/user")
  | project Timestamp, DeviceName, AccountName, FileName, ProcessCommandLine
severity: medium
risk_score: 55
tactics:
  - Discovery
techniques:
  - T1069
  - T1482
  - T1087
kill_chain_phases:
  - Discovery
data_sources:
  - DeviceProcessEvents
falsepositives:
  - Domain administration and helpdesk support
  - Inventory or audit scripts
triage:
  - Review the exact group or trust discovery commands
  - Determine whether the user normally performs domain recon
  - Check for concurrent lateral movement or credential access
validation:
  - Run net group, nltest, and whoami discovery commands in a lab
lifecycle: experimental
owner: Detection Engineering
tags:
  - attack.discovery
  - sentinel
  - discovery
