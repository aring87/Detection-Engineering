title: PowerShell Encoded Command Decoding
id: SENT-EXEC-0001
status: experimental
description: Detects PowerShell execution with -enc or EncodedCommand arguments and attempts to decode the supplied Base64 command for analyst review.
author: Adam Ring
date: 2025-07-31
modified: 2026-03-06
platform: microsoft_sentinel
query_language: kql
logsource:
  product: windows
  category: process_creation
query: |
  DeviceProcessEvents
  | where FileName =~ "powershell.exe"
  | where ProcessCommandLine has_any ("-enc", "EncodedCommand")
  | extend Encoded = extract(@"(?:-enc|EncodedCommand)\s+([a-zA-Z0-9+/=]+)", 1, ProcessCommandLine)
  | extend Decoded = tostring(base64_decodestring(Encoded))
  | project Timestamp, DeviceName, AccountName, ProcessCommandLine, Encoded, Decoded
severity: high
risk_score: 75
tactics:
  - Execution
techniques:
  - T1059.001
kill_chain_phases:
  - Execution
data_sources:
  - DeviceProcessEvents
falsepositives:
  - Administrative PowerShell automation using encoded commands
  - Approved enterprise scripts or software deployment tooling
triage:
  - Review the decoded command contents for malicious behavior or suspicious keywords
  - Validate the user account, host, and parent process context
  - Determine whether the execution aligns with approved administration activity
  - Review related process, network, and file events on the same device
validation:
  - Test with known benign encoded PowerShell commands
  - Test with Atomic Red Team or lab-generated encoded PowerShell execution
  - Confirm Base64 decoding succeeds and produces useful analyst context
lifecycle: experimental
owner: Detection Engineering
tags:
  - attack.execution
  - attack.t1059.001
  - ckc.execution
  - powershell
  - encoded-command
  - sentinel
