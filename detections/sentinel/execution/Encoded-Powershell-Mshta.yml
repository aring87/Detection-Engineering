title: MSHTA Launching Encoded PowerShell
id: SENT-EXEC-0002
status: experimental
description: Detects mshta.exe launching or containing encoded PowerShell content, which may indicate proxy execution of a malicious PowerShell payload.
author: Adam Ring
date: 2025-08-07
modified: 2026-03-06
platform: microsoft_sentinel
query_language: kql
logsource:
  product: windows
  category: process_creation
query: |
  DeviceProcessEvents
  | where FileName =~ "mshta.exe"
  | where ProcessCommandLine has "powershell"
  | where ProcessCommandLine has_any ("-enc", "EncodedCommand")
  | project Timestamp, DeviceName, AccountName, FileName, ProcessCommandLine
severity: medium
risk_score: 60
tactics:
  - Execution
techniques:
  - T1218.005
kill_chain_phases:
  - Execution
data_sources:
  - DeviceProcessEvents
falsepositives:
  - Administrative scripts or legacy applications that legitimately call mshta with PowerShell
  - Internal tooling that embeds PowerShell in HTA execution workflows
triage:
  - Review the full mshta command line for embedded script or remote content
  - Identify the parent process and user context
  - Determine whether the host normally uses mshta.exe
  - Review related child processes, network connections, and file writes
validation:
  - Test with lab execution of mshta launching encoded PowerShell
  - Confirm expected benign mshta activity does not trigger excessively
  - Validate ATT&CK mapping and process ancestry visibility
lifecycle: experimental
owner: Detection Engineering
tags:
  - attack.execution
  - attack.t1218.005
  - ckc.execution
  - mshta
  - powershell
  - encoded-command
  - sentinel