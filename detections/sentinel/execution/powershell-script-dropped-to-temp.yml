title: PowerShell Script Dropped to Temp
id: SENT-EXEC-0003
status: experimental
description: Detects PowerShell creating script files in temporary directories, a common staging pattern for malware and offensive tooling.
author: Adam Ring
date: 2026-03-06
modified: 2026-03-06
platform: microsoft_sentinel
query_language: kql
logsource:
  product: windows
  category: file_event
query: |
  DeviceFileEvents
  | where FolderPath has_any ("AppData\\Local\\Temp","Windows\\Temp")
  | where FileName endswith ".ps1" or FileName endswith ".psm1"
  | where InitiatingProcessFileName in~ ("powershell.exe","pwsh.exe")
  | project Timestamp, DeviceName, InitiatingProcessAccountName, InitiatingProcessFileName, FileName, FolderPath
severity: high
risk_score: 70
tactics:
  - Execution
techniques:
  - T1059.001
kill_chain_phases:
  - Execution
data_sources:
  - DeviceFileEvents
falsepositives:
  - Temporary admin scripts written during troubleshooting
  - Software packaging or update workflows
triage:
  - Inspect the script path and filename for staging patterns
  - Determine whether the script was executed after being written
  - Check for related downloads or persistence changes
validation:
  - Write benign PowerShell scripts to a temp path from PowerShell
lifecycle: experimental
owner: Detection Engineering
tags:
  - attack.execution
  - attack.t1059.001
  - sentinel
  - execution
