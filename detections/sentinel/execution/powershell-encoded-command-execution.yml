title: PowerShell Encoded Command Execution
id: SENT-EXEC-0001
status: experimental
description: Detects PowerShell execution with -enc or EncodedCommand arguments and decodes the command for analyst review.
author: Adam Ring
date: 2026-03-06
modified: 2026-03-06
platform: microsoft_sentinel
query_language: kql
logsource:
  product: windows
  category: process_creation
query: |
  DeviceProcessEvents
  | where FileName in~ ("powershell.exe","pwsh.exe")
  | where ProcessCommandLine has_any ("-enc","-encodedcommand")
  | extend Encoded = extract(@"(?:-enc|-encodedcommand)\s+([a-zA-Z0-9+/=]+)", 1, ProcessCommandLine)
  | extend Decoded = tostring(base64_decodestring(Encoded))
  | project Timestamp, DeviceName, AccountName, FileName, ProcessCommandLine, Encoded, Decoded
severity: high
risk_score: 75
tactics:
  - Execution
techniques:
  - T1059.001
kill_chain_phases:
  - Execution
data_sources:
  - DeviceProcessEvents
falsepositives:
  - Approved administrative automation using encoded PowerShell
  - Software deployment tooling
triage:
  - Review the decoded command for suspicious behavior
  - Validate account, device, and parent process context
  - Correlate with file, registry, and network events
validation:
  - Run benign encoded PowerShell commands in a lab and confirm decoding
lifecycle: experimental
owner: Detection Engineering
tags:
  - attack.execution
  - attack.t1059.001
  - sentinel
  - execution
