title: Suspicious Browser Credential Store Access
id: SENT-CRED-0003
status: experimental
description: Detects non-browser processes accessing browser login or cookies databases often targeted for credential theft.
author: Adam Ring
date: 2026-03-06
modified: 2026-03-06
platform: microsoft_sentinel
query_language: kql
logsource:
  product: windows
  category: file_event
query: |
  DeviceFileEvents
  | where FolderPath has_any ("\Google\Chrome\User Data\Default\Login Data","\Microsoft\Edge\User Data\Default\Login Data","\Mozilla\Firefox\Profiles")
  | where InitiatingProcessFileName !in~ ("chrome.exe","msedge.exe","firefox.exe")
  | project Timestamp, DeviceName, InitiatingProcessAccountName, InitiatingProcessFileName, FolderPath, FileName
severity: medium
risk_score: 65
tactics:
  - Credential Access
techniques:
  - T1555.003
kill_chain_phases:
  - Credential Access
data_sources:
  - DeviceFileEvents
falsepositives:
  - Approved backup, forensic, or profile migration tooling
  - Browser repair or enterprise management utilities
triage:
  - Identify the process touching the browser credential store
  - Determine whether the process is signed or approved
  - Review related archive creation or exfiltration behavior
validation:
  - Access browser login databases from a lab script or forensics tool
lifecycle: experimental
owner: Detection Engineering
tags:
  - attack.credential-access
  - attack.t1555.003
  - sentinel
  - credential-access
