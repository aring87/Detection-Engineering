title: External Lookup Tool Usage
id: SENT-RECON-0003
status: experimental
description: Detects DNS and WHOIS lookup utilities that may be used for reconnaissance against external infrastructure.
author: Adam Ring
date: 2026-03-06
modified: 2026-03-06
platform: microsoft_sentinel
query_language: kql
logsource:
  product: windows
  category: process_creation
query: |
  DeviceProcessEvents
  | where FileName in~ ("nslookup.exe","whois.exe","dig.exe")
  | where ProcessCommandLine has_any ("-type=","/querytype","mx","txt","soa","ns")
  | project Timestamp, DeviceName, AccountName, FileName, ProcessCommandLine
severity: low
risk_score: 40
tactics:
  - Reconnaissance
techniques:
  - T1590
  - T1596
kill_chain_phases:
  - Reconnaissance
data_sources:
  - DeviceProcessEvents
falsepositives:
  - Legitimate DNS troubleshooting
  - Helpdesk or network operations lookups
triage:
  - Review queried domains and record types
  - Determine whether usage aligns with admin duties
  - Check for nearby phishing preparation or scanning
validation:
  - Run nslookup or dig queries for MX, TXT, or SOA records
lifecycle: experimental
owner: Detection Engineering
tags:
  - attack.reconnaissance
  - sentinel
  - reconnaissance
