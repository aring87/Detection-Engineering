title: External Network Scanner Execution
id: SENT-RECON-0001
status: experimental
description: Detects common network scanning tools executed on endpoints, which may indicate internal or external reconnaissance.
author: Adam Ring
date: 2026-03-06
modified: 2026-03-06
platform: microsoft_sentinel
query_language: kql
logsource:
  product: windows
  category: process_creation
query: |
  DeviceProcessEvents
  | where FileName in~ ("nmap.exe","masscan.exe","zmap.exe","advanced_ip_scanner.exe","netscan.exe")
  | project Timestamp, DeviceName, AccountName, FileName, ProcessCommandLine, InitiatingProcessFileName
severity: medium
risk_score: 55
tactics:
  - Reconnaissance
techniques:
  - T1595
kill_chain_phases:
  - Reconnaissance
data_sources:
  - DeviceProcessEvents
falsepositives:
  - Approved vulnerability management or security assessment activity
  - Authorized network troubleshooting or engineering usage
triage:
  - Validate whether the scanning tool is approved for the user or host role
  - Review scan targets and command-line options
  - Check for related network activity or follow-on execution
validation:
  - Execute an approved scanner in a lab and confirm the analytic triggers
  - Baseline sanctioned scanning hosts to support tuning
lifecycle: experimental
owner: Detection Engineering
tags:
  - attack.reconnaissance
  - attack.t1595
  - sentinel
  - reconnaissance
