title: DNS Tunneling Behavior
id: SENT-C2-0001
status: experimental
description: Detects excessive or unusually long DNS query patterns that may represent DNS tunneling or beaconing.
author: Adam Ring
date: 2026-03-06
modified: 2026-03-06
platform: microsoft_sentinel
query_language: kql
logsource:
  product: windows
  category: network
query: |
  DeviceNetworkEvents
  | where RemotePort == 53
  | extend QueryLength = strlen(RemoteUrl)
  | summarize QueryCount=count(), AvgQueryLength=avg(QueryLength) by DeviceName, InitiatingProcessFileName, bin(Timestamp, 15m)
  | where QueryCount >= 100 and AvgQueryLength >= 40
severity: high
risk_score: 78
tactics:
  - Command and Control
techniques:
  - T1071.004
kill_chain_phases:
  - Command and Control
data_sources:
  - DeviceNetworkEvents
falsepositives:
  - DNS-heavy developer or security tools
  - Internal diagnostics generating repetitive lookups
triage:
  - Review the process generating the DNS traffic
  - Determine whether the queried domains or lengths are abnormal
  - Check for TXT-heavy or high-entropy query behavior
validation:
  - Replay DNS tunneling lab traffic or generate long repetitive queries
lifecycle: experimental
owner: Detection Engineering
tags:
  - attack.command-and-control
  - attack.t1071.004
  - sentinel
  - command-and-control
