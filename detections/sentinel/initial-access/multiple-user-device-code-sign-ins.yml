title: Multiple User Device Code Sign-Ins
id: SENT-INIT-0001
status: experimental
description: Detects device code authentication across multiple users, a pattern associated with phishing and token theft.
author: Adam Ring
date: 2026-03-06
modified: 2026-03-06
platform: microsoft_sentinel
query_language: kql
logsource:
  product: azure
  category: authentication
query: |
  SigninLogs
  | where AuthenticationProtocol =~ "deviceCode"
  | summarize UserCount=dcount(UserPrincipalName), Users=make_set(UserPrincipalName, 20) by IPAddress, AppDisplayName, bin(TimeGenerated, 30m)
  | where UserCount >= 3
severity: high
risk_score: 75
tactics:
  - Initial Access
  - Credential Access
techniques:
  - T1566
  - T1078
kill_chain_phases:
  - Initial Access
data_sources:
  - SigninLogs
falsepositives:
  - Legitimate device code workflows in limited environments
  - Test tenants or lab scenarios
triage:
  - Review the source IP, users, and app involved
  - Determine whether device code is allowed or expected
  - Correlate with mailbox access, app consent, or token abuse
validation:
  - Perform a test device code sign-in in a lab
lifecycle: experimental
owner: Detection Engineering
tags:
  - attack.initial-access
  - attack.credential-access
  - sentinel
  - initial-access
