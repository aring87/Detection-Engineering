title: User Click Spike to Suspicious Domain
id: SENT-RESDEV-0003
status: experimental
description: Flags repeated user clicks to the same destination domain, which may indicate attacker-controlled infrastructure used for phishing.
author: Adam Ring
date: 2026-03-06
modified: 2026-03-06
platform: microsoft_sentinel
query_language: kql
logsource:
  product: microsoft365
  category: web
query: |
  UrlClickEvents
  | where ActionType =~ "ClickAllowed"
  | extend Domain=extract(@"https?://([^/]+)", 1, Url)
  | summarize Clicks=count(), Users=dcount(AccountUpn) by Domain, bin(Timestamp, 1d)
  | where Clicks >= 5 and Users >= 3
severity: medium
risk_score: 55
tactics:
  - Resource Development
  - Initial Access
techniques:
  - T1583.001
kill_chain_phases:
  - Resource Development
data_sources:
  - UrlClickEvents
falsepositives:
  - Marketing or internal campaign links
  - Legitimate external services accessed by many users
triage:
  - Review the domain and related email campaign data
  - Determine whether the domain is newly observed or suspicious
  - Check for credential harvesting follow-on activity
validation:
  - Validate URL parsing and threshold behavior with benign click data
lifecycle: experimental
owner: Detection Engineering
tags:
  - attack.resource-development
  - attack.initial-access
  - sentinel
  - resource-development
