title: PowerShell Script Block Logging Disabled
id: SENT-DEFEV-0001
status: experimental
description: Detects registry changes that disable or weaken PowerShell logging controls.
author: Adam Ring
date: 2026-03-06
modified: 2026-03-06
platform: microsoft_sentinel
query_language: kql
logsource:
  product: windows
  category: registry_event
query: |
  DeviceRegistryEvents
  | where RegistryKey has_any (
      @"\Software\Policies\Microsoft\Windows\PowerShell\ScriptBlockLogging",
      @"\Software\Policies\Microsoft\Windows\PowerShell\Transcription")
  | where ActionType in~ ("RegistryValueSet","RegistryKeyCreated")
  | project Timestamp, DeviceName, InitiatingProcessAccountName, RegistryKey, RegistryValueName, RegistryValueData, InitiatingProcessFileName
severity: high
risk_score: 80
tactics:
  - Defense Evasion
techniques:
  - T1562.001
kill_chain_phases:
  - Defense Evasion
data_sources:
  - DeviceRegistryEvents
falsepositives:
  - Group Policy changes from approved admin workflows
  - Security testing in a lab
triage:
  - Review the setting changed and the initiating process
  - Determine whether the host received an expected policy update
  - Check for encoded PowerShell or LOLBin activity afterward
validation:
  - Toggle PowerShell logging settings in a lab and confirm telemetry
lifecycle: experimental
owner: Detection Engineering
tags:
  - attack.defense-evasion
  - attack.t1562.001
  - sentinel
  - defense-evasion
