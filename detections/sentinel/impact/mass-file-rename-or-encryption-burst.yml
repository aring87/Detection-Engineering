title: Mass File Rename or Encryption Burst
id: SENT-IMPACT-0002
status: experimental
description: Detects rapid file modifications across multiple directories consistent with ransomware encryption or destructive impact.
author: Adam Ring
date: 2026-03-06
modified: 2026-03-06
platform: microsoft_sentinel
query_language: kql
logsource:
  product: windows
  category: file_event
query: |
  DeviceFileEvents
  | summarize FileOps=count(), Paths=dcount(FolderPath) by DeviceName, InitiatingProcessAccountName, InitiatingProcessFileName, bin(Timestamp, 10m)
  | where FileOps >= 500 and Paths >= 10
severity: high
risk_score: 82
tactics:
  - Impact
techniques:
  - T1486
kill_chain_phases:
  - Impact
data_sources:
  - DeviceFileEvents
falsepositives:
  - Bulk file migrations or legitimate conversion jobs
  - Backup or indexing products that touch many files
triage:
  - Identify the process making the changes and whether it is trusted
  - Review file extension changes and ransom note drops
  - Check for shadow copy deletion or recovery tampering
validation:
  - Use a benign mass file modification script in a lab and compare thresholds
lifecycle: experimental
owner: Detection Engineering
tags:
  - attack.impact
  - attack.t1486
  - sentinel
  - impact
