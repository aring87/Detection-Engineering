title: Volume Shadow Copy Deletion
id: SENT-IMPACT-0001
status: experimental
description: Detects deletion of shadow copies using built-in Windows utilities, a common ransomware precursor.
author: Adam Ring
date: 2026-03-06
modified: 2026-03-06
platform: microsoft_sentinel
query_language: kql
logsource:
  product: windows
  category: process_creation
query: |
  DeviceProcessEvents
  | where FileName in~ ("vssadmin.exe","wmic.exe","powershell.exe")
  | where ProcessCommandLine has_any ("delete shadows","shadowcopy delete","Win32_Shadowcopy")
  | project Timestamp, DeviceName, AccountName, FileName, ProcessCommandLine
severity: high
risk_score: 85
tactics:
  - Impact
techniques:
  - T1490
kill_chain_phases:
  - Impact
data_sources:
  - DeviceProcessEvents
falsepositives:
  - Approved backup maintenance or restore workflows
  - Lab validation or recovery testing
triage:
  - Validate whether the deletion was authorized
  - Check for concurrent encryption or log clearing activity
  - Inspect the parent process and user context
validation:
  - Delete shadow copies on a lab machine or replay representative telemetry
lifecycle: experimental
owner: Detection Engineering
tags:
  - attack.impact
  - attack.t1490
  - sentinel
  - impact
