title: Boot Configuration or Recovery Tampering
id: SENT-IMPACT-0003
status: experimental
description: Detects attempts to disable recovery options or alter boot configuration, often used to hinder recovery during destructive attacks.
author: Adam Ring
date: 2026-03-06
modified: 2026-03-06
platform: microsoft_sentinel
query_language: kql
logsource:
  product: windows
  category: process_creation
query: |
  DeviceProcessEvents
  | where FileName in~ ("bcdedit.exe","reagentc.exe")
  | where ProcessCommandLine has_any ("recoveryenabled no","bootstatuspolicy ignoreallfailures","/disable")
  | project Timestamp, DeviceName, AccountName, FileName, ProcessCommandLine
severity: high
risk_score: 78
tactics:
  - Impact
  - Defense Evasion
techniques:
  - T1490
  - T1562
kill_chain_phases:
  - Impact
data_sources:
  - DeviceProcessEvents
falsepositives:
  - Rare approved maintenance or recovery workflows
  - OS imaging or hardware repair activity
triage:
  - Review whether the system change was approved maintenance
  - Check for ransomware staging or shadow copy deletion nearby
  - Inspect the initiating account and process chain
validation:
  - Run benign boot recovery configuration changes in a lab
lifecycle: experimental
owner: Detection Engineering
tags:
  - attack.impact
  - attack.defense-evasion
  - sentinel
  - impact
